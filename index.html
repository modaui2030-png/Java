<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/images/logo_icon/favicon.png" />
    <!-- Apple PWA: 必须有这些才能在 iOS 安装到桌面 -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/logo_icon/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/images/logo_icon/logo.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/assets/images/logo_icon/favicon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="deepay" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-TileImage" content="/assets/images/logo_icon/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>DeePay — Pagamenti aziendali per l'Italia e l'Europa</title>
    <meta name="description" content="DeePay è la piattaforma di pagamenti digitali per aziende italiane ed europee. Bonifici istantanei, carte aziendali e incassi in un'unica soluzione." />

    <!-- Startup shell: shown while React loads to prevent blank page -->
    <style>
      #deepay-startup-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #deepay-startup-shell.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .startup-logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }
      .startup-brand {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }
      .startup-tagline {
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 40px;
      }
      .startup-dots {
        display: flex;
        gap: 8px;
      }
      .startup-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.4);
        animation: dotPulse 1.2s infinite ease-in-out;
      }
      .startup-dots span:nth-child(2) { animation-delay: 0.2s; }
      .startup-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dotPulse {
        0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
        40% { transform: scale(1.3); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Startup shell: visible before React mounts -->
    <div id="deepay-startup-shell" aria-hidden="true">
      <div class="startup-logo">
        <svg width="40" height="40" viewBox="0 0 60 60" fill="none">
          <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#10B981"/>
              <stop offset="100%" stop-color="#34D399"/>
            </linearGradient>
          </defs>
          <path d="M15 10 L15 50 L32 50 C42 50 48 42 48 30 C48 18 42 10 32 10 Z M20 15 L32 15 C38 15 43 21 43 30 C43 39 38 45 32 45 L20 45 Z" fill="url(#g)"/>
        </svg>
      </div>
      <div class="startup-brand">DeePay</div>
      <div class="startup-tagline">Piattaforma Pagamenti</div>
      <div class="startup-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <!-- Pre-React mobile detection: runs BEFORE bundle loads, immune to SW cache -->
    <script>
      (function() {
        var ua = navigator.userAgent || '';
        var w = window.innerWidth || screen.width || 0;
        var touch = navigator.maxTouchPoints > 1;
        var mobileUA = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini|Mobile|mobile|Tablet|tablet|Windows Phone/i.test(ua);
        var narrow = w < 1024;
        window.__DEEPAY_MOBILE__ = mobileUA || narrow || touch;
        document.documentElement.setAttribute('data-mobile', window.__DEEPAY_MOBILE__ ? '1' : '0');
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
